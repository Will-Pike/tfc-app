# nginx server block for tfc.schnurr-app.com
#
# Install:
#   sudo cp deploy/nginx-tfc.conf /etc/nginx/sites-available/tfc.schnurr-app.com
#   sudo ln -s /etc/nginx/sites-available/tfc.schnurr-app.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot (see DEPLOY.md) — it will rewrite this file to add the
# managed TLS listener and a port-80 -> 443 redirect automatically.

server {
    listen 80;
    server_name tfc.schnurr-app.com;

    client_max_body_size 25M;  # room for photo uploads / PDF generation

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # PDF generation can be slow
    }
}
