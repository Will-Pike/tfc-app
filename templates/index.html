<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TFC Inspection OBS Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  <style>
    body { padding: 20px; }
    .btn-primary, .btn-success, .btn-danger, .btn-info, .btn-warning, .btn-secondary { width: 100%; margin-top: 10px; }
    .status { margin-top: 15px; text-align: center; }
    .pdf-button { margin-top: 1vh; width: 100%; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="text-center mb-1">TFC Inspection</h1>
  <p class="text-center text-muted mb-4">Project: {{ project }}</p>

  <div class="card mb-4 card-accent">
    <div class="card-body">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="buildingSelect" class="form-label">Building:</label>
          <select id="buildingSelect" class="form-select" onchange="onBuildingChange()">
            <option value="">Select building...</option>
            {% for name in buildings.keys() %}
            <option value="{{ name }}">{{ name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label for="floorSelect" class="form-label">Floor:</label>
          <select id="floorSelect" class="form-select" onchange="onFloorChange()" disabled>
            <option value="">Select building first</option>
          </select>
        </div>
      </div>

      <div class="obs-hero">
        <div class="obs-text">Next OBS ID</div>
        <div class="obs-number muted" id="obsNumber">Select building &amp; floor</div>
        <div class="obs-stepper d-flex align-items-center justify-content-center gap-3">
          <button class="btn btn-outline-secondary" id="undoBtn" onclick="decrementObs()"
                  title="Go back one ID" disabled>−1</button>
          <button class="btn btn-outline-secondary" id="advanceBtn" onclick="advanceObs()"
                  title="Advance one ID" disabled>+1</button>
        </div>
      </div>

      <a href="#" class="btn btn-success" id="formButton" target="_blank"
         onclick="startObservationReport(event)" style="pointer-events:none; opacity:0.5;">
         Start Observation Report
      </a>

      <button class="btn btn-secondary pdf-button" onclick="showDateRangePicker()">Generate Reports</button>
      <div id="reportStatus" class="status"></div>

      <div id="downloadSection" style="display:none; margin-top:20px;">
        <div id="downloadMessage" class="alert alert-success" role="alert">Reports are ready for download!</div>
        <a href="#" id="downloadPdfBtn" class="btn btn-primary" style="display:block; width:100%; margin-bottom:15px;" download>Download PDF Report</a>
        <a href="#" id="downloadCsvBtn" class="btn btn-info" style="display:block; width:100%; margin-top:15px;" download>Download Spreadsheet Report</a>
      </div>

      <a href="/edit_obs" class="btn btn-warning position-relative" id="editBtn">
        Edit / Price OBS Reports
        <span id="unpricedBadge"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              style="display:none;" title="reports needing a price"></span>
      </a>

      <div id="progressContainer" style="display:none; margin-top:15px;">
        <div style="background:#eee; width:100%; height:24px; border-radius:12px;">
          <div id="progressBar" style="background:#0d6efd; width:0%; height:24px; border-radius:12px; transition:width 0.2s;"></div>
        </div>
        <div id="progressText" style="text-align:center; margin-top:4px;">0%</div>
      </div>
    </div>
  </div>
</div>

<!-- Date Range Picker Modal -->
<div class="modal fade" id="dateRangeModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Select Date Range</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="reportBuilding" class="form-label">Building:</label>
          <select id="reportBuilding" class="form-control">
            <option value="">Both Buildings</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="startDate" class="form-label">Start Date:</label>
          <input type="date" id="startDate" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="endDate" class="form-label">End Date:</label>
          <input type="date" id="endDate" class="form-control" required>
        </div>
        <div class="text-muted small">
          <p>Quick selects:</p>
          <button class="btn btn-sm btn-outline-secondary" onclick="setDateRange(7)">Last 7 days</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="setDateRange(30)">Last 30 days</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="setDateRange(90)">Last 90 days</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="confirmDateRange()">Generate Reports</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const PROJECT = {{ project|tojson }};
const BUILDINGS = {{ buildings|tojson }};
const PREFIX = {{ id_prefix|tojson }};

document.addEventListener('DOMContentLoaded', function () {
  refreshUnpricedBadge();
  initDefaults();
});

function initDefaults() {
  // Pull the most recent record's building/floor and preselect them.
  fetch('/get_current_obs?project=' + encodeURIComponent(PROJECT))
    .then(r => r.json())
    .then(data => {
      const db = data.default_building;
      const df = data.default_floor;
      if (db && BUILDINGS[db]) {
        document.getElementById('buildingSelect').value = db;
        onBuildingChange();  // populates the floor options for this building
        if (df) {
          const fs = document.getElementById('floorSelect');
          if ([...fs.options].some(o => o.value === String(df))) {
            fs.value = String(df);
          }
        }
      }
      updateOBSDisplay();
    })
    .catch(() => {});
}

function refreshUnpricedBadge() {
  fetch('/get_unpriced_count?project=' + encodeURIComponent(PROJECT))
    .then(r => r.json())
    .then(data => {
      const badge = document.getElementById('unpricedBadge');
      if (data && data.count > 0) {
        badge.textContent = data.count;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    })
    .catch(() => {});
}

function onBuildingChange() {
  manualAdjusted = false;  // switching context clears any dialed-in ID
  const building = document.getElementById('buildingSelect').value;
  const floorSelect = document.getElementById('floorSelect');
  floorSelect.innerHTML = '';

  if (!building || !BUILDINGS[building]) {
    floorSelect.disabled = true;
    floorSelect.innerHTML = '<option value="">Select building first</option>';
    updateOBSDisplay();
    return;
  }

  const floors = BUILDINGS[building].floors || 0;
  floorSelect.disabled = false;
  floorSelect.innerHTML = '<option value="">Select floor...</option>';
  for (let f = 1; f <= floors; f++) {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = 'Floor ' + f;
    floorSelect.appendChild(opt);
  }
  updateOBSDisplay();
}

// The displayed sequence number. baseSeq is the auto next-available ID from the
// server; currentSeq is what's shown (the user can dial it with +1 / -1).
// manualAdjusted = the user has stepped away from the auto value, so we stop
// overwriting it on preview refreshes.
let baseSeq = null;
let currentSeq = null;
let manualAdjusted = false;

// Compose the OBS ID exactly as the server's compose_obs_id does.
function composeObsId(seq) {
  const b = document.getElementById('buildingSelect').value;
  const f = document.getElementById('floorSelect').value;
  if (b && f && BUILDINGS[b]) {
    const code = BUILDINGS[b].code || b.charAt(0).toUpperCase();
    return PREFIX + '-' + code + f + '-' + seq;
  }
  return String(seq);
}

function setControlsEnabled(enabled) {
  const btn = document.getElementById('formButton');
  btn.style.pointerEvents = enabled ? 'auto' : 'none';
  btn.style.opacity = enabled ? '1' : '0.5';
  document.getElementById('advanceBtn').disabled = !enabled;
  // -1 stays disabled at the floor of 1 (can't go below the first ID).
  document.getElementById('undoBtn').disabled =
    !(enabled && currentSeq != null && currentSeq > 1);
}

function renderObs() {
  const obsEl = document.getElementById('obsNumber');
  if (currentSeq == null) return;
  obsEl.textContent = composeObsId(currentSeq);
  obsEl.classList.remove('muted');
  setControlsEnabled(true);
}

function onFloorChange() {
  manualAdjusted = false;  // a new floor is a fresh context
  updateOBSDisplay();
}

function updateOBSDisplay() {
  const building = document.getElementById('buildingSelect').value;
  const floor = document.getElementById('floorSelect').value;
  const obsEl = document.getElementById('obsNumber');

  if (!building || !floor) {
    obsEl.textContent = 'Select building & floor';
    obsEl.classList.add('muted');
    currentSeq = null;
    baseSeq = null;
    setControlsEnabled(false);
    document.getElementById('formButton').removeAttribute('href');
    return;
  }

  // Preview only (does NOT reserve the number).
  const params = new URLSearchParams({ project: PROJECT, building: building, floor: floor });
  fetch('/get_current_obs?' + params.toString())
    .then(r => r.json())
    .then(data => {
      if (data.error) { obsEl.textContent = 'Error'; return; }
      baseSeq = data.seq;
      if (!manualAdjusted) currentSeq = baseSeq;
      renderObs();
    });
}

function advanceObs() {   // +1
  if (currentSeq == null) return;
  currentSeq += 1;
  manualAdjusted = true;
  renderObs();
}

function decrementObs() { // -1 — can walk back into IDs that already exist
  if (currentSeq == null || currentSeq <= 1) return;
  currentSeq -= 1;
  manualAdjusted = true;
  renderObs();
}

function startObservationReport(event) {
  event.preventDefault();
  const building = document.getElementById('buildingSelect').value;
  const floor = document.getElementById('floorSelect').value;
  if (!building || !floor || currentSeq == null) return;

  // Open the tab synchronously on the click so the browser doesn't block it
  // after our async round-trip; we set its URL once the server responds.
  const win = window.open('', '_blank');
  sendStart(building, floor, currentSeq, !manualAdjusted, false, win);
}

function sendStart(building, floor, seq, auto, confirmFlag, win) {
  fetch('/start_observation', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ project: PROJECT, building: building, floor: floor,
                           seq: seq, auto: auto, confirm: confirmFlag })
  })
    .then(r => r.json())
    .then(data => {
      if (data.status === 'exists') {
        const ok = window.confirm(
          'This will REPLACE existing observation ' + data.obs_id + '.\n\n' +
          'Its current data and photo links will be permanently deleted, and ' +
          'you\'ll re-enter it on the form.\n\nContinue?');
        if (ok) { sendStart(building, floor, seq, auto, true, win); }
        else if (win) { win.close(); }
        return;
      }
      if (data.status === 'taken') {
        if (win) win.close();
        alert('OBS ID ' + data.obs_id + ' is currently being used by someone else. ' +
              'Please pick a different number.');
        return;
      }
      if (data.status === 'ok' && data.form_url) {
        if (win) win.location = data.form_url; else window.open(data.form_url, '_blank');
        manualAdjusted = false;
        updateOBSDisplay();  // back to the next available ID
        return;
      }
      if (win) win.close();
      alert((data && data.error) || 'Could not start observation.');
    })
    .catch(err => { if (win) win.close(); alert('Error: ' + err.message); });
}

// Keep the previewed ID fresh when returning to the tab (reflects others'
// submissions) — but don't clobber a number the user has manually dialed.
window.addEventListener('focus', function () {
  refreshUnpricedBadge();
  if (!manualAdjusted &&
      document.getElementById('buildingSelect').value &&
      document.getElementById('floorSelect').value) {
    updateOBSDisplay();
  }
});

/* ---- Report generation (date range -> PDF + CSV) ---- */
let progressInterval;
let progress = 0;
let estimatedTime = 30;

function startFakeProgressBar(recordCount) {
  estimatedTime = Math.max(10, recordCount * 2);
  progress = 0;
  document.getElementById('progressContainer').style.display = '';
  updateProgressBar();
  progressInterval = setInterval(() => {
    if (progress < 99) { progress += 100 / (estimatedTime * 2.7778); updateProgressBar(); }
  }, 500);
}
function updateProgressBar() {
  document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
  document.getElementById('progressText').textContent = Math.floor(Math.min(progress, 100)) + '%';
}
function finishProgressBar() { clearInterval(progressInterval); progress = 100; updateProgressBar(); }

let dateRangeModal;
function populateReportBuildings() {
  const sel = document.getElementById('reportBuilding');
  // Keep the leading "Both Buildings" option; rebuild the rest from config.
  sel.length = 1;
  Object.keys(BUILDINGS).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}
function showDateRangePicker() {
  if (!dateRangeModal) dateRangeModal = new bootstrap.Modal(document.getElementById('dateRangeModal'));
  populateReportBuildings();
  const today = new Date();
  const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
  document.getElementById('endDate').value = today.toISOString().split('T')[0];
  document.getElementById('startDate').value = weekAgo.toISOString().split('T')[0];
  document.getElementById('endDate').max = today.toISOString().split('T')[0];
  document.getElementById('startDate').max = today.toISOString().split('T')[0];
  dateRangeModal.show();
}
function setDateRange(days) {
  const end = new Date(), start = new Date(); start.setDate(start.getDate() - days);
  document.getElementById('endDate').value = end.toISOString().split('T')[0];
  document.getElementById('startDate').value = start.toISOString().split('T')[0];
}
function confirmDateRange() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const building = document.getElementById('reportBuilding').value;
  if (!startDate || !endDate) { alert('Please select both start and end dates'); return; }
  if (new Date(startDate) > new Date(endDate)) { alert('Start date must be before end date'); return; }
  dateRangeModal.hide();
  document.getElementById('downloadSection').style.display = 'none';
  document.getElementById('reportStatus').textContent = "Generating reports...";
  document.getElementById('progressContainer').style.display = '';
  startFakeProgressBar(10);
  fetch('/generate_reports', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ project: PROJECT, start_date: startDate, end_date: endDate, building: building })
  })
  .then(res => res.json())
  .then(data => {
    if (data.job_id) { pollReportsStatus(data.job_id); }
    else { document.getElementById('reportStatus').textContent = "Failed to start report generation."; document.getElementById('progressContainer').style.display = 'none'; }
  })
  .catch(err => { document.getElementById('reportStatus').textContent = "Error: " + err.message; document.getElementById('progressContainer').style.display = 'none'; });
}
function pollReportsStatus(job_id) {
  fetch(`/reports_status/${job_id}`)
    .then(res => res.json())
    .then(data => {
      if (data.status === "finished") {
        finishProgressBar();
        document.getElementById('reportStatus').textContent = "";
        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('downloadSection').style.display = 'block';
        document.getElementById('downloadMessage').textContent = "Reports are ready for download!";
        document.getElementById('downloadPdfBtn').href = data.pdf_url;
        document.getElementById('downloadCsvBtn').href = data.csv_url;
        document.getElementById('downloadPdfBtn').style.display = 'block';
      } else if (data.status === "failed") {
        document.getElementById('reportStatus').textContent = "Report generation failed: " + (data.error || "Unknown error");
        document.getElementById('progressContainer').style.display = 'none';
        if (data.csv_url) {
          document.getElementById('downloadSection').style.display = 'block';
          document.getElementById('downloadMessage').textContent = "PDF failed, but the spreadsheet is ready to download.";
          document.getElementById('downloadPdfBtn').style.display = 'none';
          document.getElementById('downloadCsvBtn').href = data.csv_url;
        }
      } else if (data.status === "in_progress") {
        if (data.progress !== undefined) {
          clearInterval(progressInterval);
          progress = data.progress; updateProgressBar();
          if (data.phase === 'merging_pdfs') {
            document.getElementById('reportStatus').textContent = `Merging PDFs into final report... (${data.processed}/${data.total} processed)`;
          } else {
            document.getElementById('reportStatus').textContent = `Processing reports... (${data.processed || 0}/${data.total || 0})`;
          }
        } else {
          document.getElementById('reportStatus').textContent = "Processing reports...";
        }
        if (data.csv_url) {
          document.getElementById('downloadSection').style.display = 'block';
          document.getElementById('downloadMessage').textContent = "Spreadsheet is ready. PDF is still processing.";
          document.getElementById('downloadPdfBtn').style.display = 'none';
          document.getElementById('downloadCsvBtn').href = data.csv_url;
        }
        setTimeout(() => pollReportsStatus(job_id), 1000);
      } else {
        document.getElementById('reportStatus').textContent = "Processing reports...";
        setTimeout(() => pollReportsStatus(job_id), 2000);
      }
    })
    .catch(err => { document.getElementById('reportStatus').textContent = "Error checking status: " + err.message; });
}
</script>
</body>
</html>
