<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit / Price OBS Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f8f9fa; }
    .container { max-width: 800px; margin: 0 auto; }
    .obs-item { cursor: pointer; transition: background-color 0.2s; }
    .obs-item:hover { background-color: #e9ecef; }
    .selected-obs { background-color: #e7f3ff !important; border-color: #0d6efd !important; }
    /* Reports awaiting a price estimate */
    .needs-price { background-color: #fff8e1; border-color: #ffc107 !important; border-left-width: 5px !important; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Edit / Price OBS Reports</h1>
    <a href="/" class="btn btn-secondary" style="width:auto;">Back to Main</a>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h5 class="card-title mb-0">Project: {{ project }}</h5>
          <small class="text-muted" id="summaryLine">Loading…</small>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="needsPriceFilter" onchange="renderObsList()">
          <label class="form-check-label" for="needsPriceFilter">Show only reports needing a price</label>
        </div>
      </div>
    </div>
  </div>

  <div class="card mb-4" id="obsListCard">
    <div class="card-body">
      <div id="obsListContainer"><p class="text-muted">Loading…</p></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Edit OBS Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <input type="hidden" id="editObsId" />
          <input type="hidden" id="editProject" />

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="editUser" class="form-label">User:</label>
              <select class="form-select" id="editUser">
                <option value="">Select user...</option>
                <option value="Chad">Chad</option>
                <option value="Greg">Greg</option>
                <option value="Jason">Jason</option>
                <option value="John">John</option>
                <option value="Mario">Mario</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="editBuilding" class="form-label">Building:</label>
              <select class="form-select" id="editBuilding">
                <option value="">Select building...</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="editFloor" class="form-label">Floor:</label>
              <input type="text" class="form-control" id="editFloor" />
            </div>
            <div class="col-md-6 mb-3">
              <label for="editRoom" class="form-label">Room:</label>
              <input type="text" class="form-control" id="editRoom" />
            </div>
          </div>

          <div class="mb-3">
            <label for="editIssue" class="form-label">Description of Issue:</label>
            <textarea class="form-control" id="editIssue" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label for="editPrice" class="form-label">Price Estimate:</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="text" class="form-control" id="editPrice" placeholder="Leave blank if not yet priced" />
            </div>
            <div class="form-text">Enter the estimated price for this observation. Blank = still needs pricing.</div>
          </div>

          <div class="mb-3">
            <label for="editResponsible" class="form-label">Who is responsible?</label>
            <select class="form-select" id="editResponsible" onchange="toggleOtherField()">
              <option value="">Select responsible party...</option>
              <option value="Electrician/Phone/Cable/other wiring">Electrician/Phone/Cable/other wiring</option>
              <option value="Plumber">Plumber</option>
              <option value="Ceiling">Ceiling</option>
              <option value="Flooring">Flooring</option>
              <option value="Door/Window/Trim/Baseboard">Door/Window/Trim/Baseboard</option>
              <option value="HVAC">HVAC</option>
              <option value="Other...">Other...</option>
            </select>
          </div>

          <div class="mb-3" id="otherResponsibleDiv" style="display:none;">
            <label for="editOtherResponsible" class="form-label">Specify other:</label>
            <input type="text" class="form-control" id="editOtherResponsible" />
          </div>

          <div class="mb-3">
            <label for="photoUpload" class="form-label">Upload Additional Photos:</label>
            <input type="file" class="form-control" id="photoUpload" multiple accept="image/*" />
            <div class="form-text">Select one or more photos to upload to Google Drive</div>
            <div id="uploadStatus" class="mt-2"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Current Photos:</label>
            <div id="currentPhotos" class="mt-2"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <div id="saveStatus" class="me-auto"></div>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveChanges()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const PROJECT = {{ project|tojson }};
const BUILDINGS = {{ buildings|tojson }};
let obsCache = [];

document.addEventListener('DOMContentLoaded', function() {
  // Populate the building dropdown in the edit modal
  const sel = document.getElementById('editBuilding');
  Object.keys(BUILDINGS).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
  loadObsList();
});

function loadObsList() {
  fetch(`/get_obs_list?project=${encodeURIComponent(PROJECT)}`)
    .then(response => response.json())
    .then(data => {
      obsCache = data.obs_list || [];
      renderObsList();
    })
    .catch(error => {
      console.error('Error loading OBS list:', error);
      document.getElementById('obsListContainer').innerHTML =
        '<p class="text-danger">Error loading OBS reports.</p>';
    });
}

function renderObsList() {
  const container = document.getElementById('obsListContainer');
  const onlyNeedsPrice = document.getElementById('needsPriceFilter').checked;
  const needsCount = obsCache.filter(o => o.needs_price).length;

  document.getElementById('summaryLine').textContent =
    `${obsCache.length} report(s) · ${needsCount} need pricing`;

  const list = onlyNeedsPrice ? obsCache.filter(o => o.needs_price) : obsCache;
  container.innerHTML = '';

  if (list.length === 0) {
    container.innerHTML = onlyNeedsPrice
      ? '<p class="text-muted">No reports are awaiting a price. 🎉</p>'
      : '<p class="text-muted">No OBS reports found for this project.</p>';
    return;
  }

  list.forEach(obs => {
    const item = document.createElement('div');
    item.className = 'obs-item p-3 border rounded mb-2' + (obs.needs_price ? ' needs-price' : '');
    item.onclick = () => selectObs(item, obs.obs_id);

    const priceHtml = obs.needs_price
      ? '<span class="badge text-bg-warning">Needs price</span>'
      : `<span class="badge text-bg-success">$${obs.price}</span>`;
    const loc = [obs.building, obs.floor ? 'Floor ' + obs.floor : '', obs.room]
      .filter(Boolean).join(' · ');

    item.innerHTML = `
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <strong>OBS ${obs.obs_id}</strong> <small class="text-muted">${obs.date}</small><br>
          <small class="text-muted">${loc}</small><br>
          <small>${obs.issue || ''}</small>
        </div>
        <div class="text-end ms-2">${priceHtml}</div>
      </div>`;
    container.appendChild(item);
  });
}

function selectObs(element, obsId) {
  document.querySelectorAll('.obs-item').forEach(i => i.classList.remove('selected-obs'));
  element.classList.add('selected-obs');
  loadObsDetails(obsId);
}

function loadObsDetails(obsId) {
  fetch(`/get_obs_details?project=${encodeURIComponent(PROJECT)}&obs_id=${encodeURIComponent(obsId)}`)
    .then(response => response.json())
    .then(data => {
      if (data.error) { alert('Error loading OBS details: ' + data.error); return; }

      document.getElementById('editProject').value = PROJECT;
      document.getElementById('editObsId').value = obsId;
      document.getElementById('editUser').value = data.user || '';
      document.getElementById('editBuilding').value = data.building || '';
      document.getElementById('editFloor').value = data.floor || '';
      document.getElementById('editRoom').value = data.room || '';
      document.getElementById('editIssue').value = data.issue || '';
      document.getElementById('editPrice').value = data.price || '';

      const responsible = data.responsible || '';
      const known = ['Electrician/Phone/Cable/other wiring', 'Plumber', 'Ceiling', 'Flooring', 'Door/Window/Trim/Baseboard', 'HVAC'];
      if (known.includes(responsible)) {
        document.getElementById('editResponsible').value = responsible;
        document.getElementById('otherResponsibleDiv').style.display = 'none';
      } else if (responsible) {
        document.getElementById('editResponsible').value = 'Other...';
        document.getElementById('editOtherResponsible').value = responsible;
        document.getElementById('otherResponsibleDiv').style.display = 'block';
      } else {
        document.getElementById('editResponsible').value = '';
        document.getElementById('otherResponsibleDiv').style.display = 'none';
      }

      displayCurrentPhotos(data.photo_url);

      document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
      const modal = new bootstrap.Modal(document.getElementById('editModal'), { backdrop: 'static', keyboard: true });
      modal.show();
      document.getElementById('saveStatus').innerHTML = '';
    })
    .catch(error => console.error('Error loading OBS details:', error));
}

function displayCurrentPhotos(photoUrls) {
  const container = document.getElementById('currentPhotos');
  if (!photoUrls || photoUrls.trim() === '') {
    container.innerHTML = '<p class="text-muted">No photos uploaded yet.</p>';
    return;
  }
  const urls = photoUrls.split(/[,\s\n\r]+/).map(u => u.trim()).filter(u => u && u.startsWith('http'));
  if (urls.length === 0) { container.innerHTML = '<p class="text-muted">No valid photo URLs found.</p>'; return; }

  let html = '<div class="row">';
  urls.forEach((url, index) => {
    html += `
      <div class="col-md-4 mb-3" id="photo-${index}">
        <div class="card"><div class="card-body text-center p-3" style="min-height: 120px;">
          <i class="fas fa-image fa-3x text-primary mb-3"></i>
          <h6 class="card-title">Photo ${index + 1}</h6>
          <a href="${url}" target="_blank" class="btn btn-primary btn-sm w-100 mb-2">View Photo</a>
          <button class="btn btn-danger btn-sm w-100" onclick="deletePhoto(${index}, '${url}')">Delete</button>
        </div></div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
  window.currentPhotoUrls = urls;
}

function deletePhoto(photoIndex, photoUrl) {
  if (!confirm('Are you sure you want to delete this photo?')) return;
  fetch('/delete_photo', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ project: PROJECT, obs_id: document.getElementById('editObsId').value, photo_url: photoUrl })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      const el = document.getElementById(`photo-${photoIndex}`); if (el) el.remove();
      document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-success py-1">Photo deleted successfully</div>';
      setTimeout(() => { document.getElementById('uploadStatus').innerHTML = ''; }, 3000);
    } else { alert('Error deleting photo: ' + (data.error || 'Unknown error')); }
  })
  .catch(error => { console.error('Error deleting photo:', error); alert('Error deleting photo'); });
}

function toggleOtherField() {
  const responsible = document.getElementById('editResponsible').value;
  const otherDiv = document.getElementById('otherResponsibleDiv');
  if (responsible === 'Other...') { otherDiv.style.display = 'block'; }
  else { otherDiv.style.display = 'none'; document.getElementById('editOtherResponsible').value = ''; }
}

function saveChanges() {
  const responsible = document.getElementById('editResponsible').value;
  const finalResponsible = responsible === 'Other...' ? document.getElementById('editOtherResponsible').value : responsible;

  const formData = {
    project: PROJECT,
    obs_id: document.getElementById('editObsId').value,
    user: document.getElementById('editUser').value,
    building: document.getElementById('editBuilding').value,
    floor: document.getElementById('editFloor').value,
    room: document.getElementById('editRoom').value,
    issue: document.getElementById('editIssue').value,
    price: document.getElementById('editPrice').value.trim(),
    responsible: finalResponsible
  };

  document.getElementById('saveStatus').innerHTML = '<div class="alert alert-info py-1">Saving...</div>';
  fetch('/update_obs', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(formData)
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      document.getElementById('saveStatus').innerHTML = '<div class="alert alert-success py-1">Changes saved successfully!</div>';
      setTimeout(() => {
        const modal = bootstrap.Modal.getInstance(document.getElementById('editModal'));
        if (modal) modal.hide();
        setTimeout(() => document.querySelectorAll('.modal-backdrop').forEach(b => b.remove()), 300);
        loadObsList();
      }, 1200);
    } else {
      document.getElementById('saveStatus').innerHTML = '<div class="alert alert-danger py-1">Error: ' + (data.error || 'Failed to save changes') + '</div>';
    }
  })
  .catch(error => {
    console.error('Error saving changes:', error);
    document.getElementById('saveStatus').innerHTML = '<div class="alert alert-danger py-1">Error saving changes</div>';
  });
}

document.getElementById('photoUpload').addEventListener('change', function(e) {
  const files = e.target.files;
  if (files.length === 0) return;
  const obsId = document.getElementById('editObsId').value;
  if (!obsId) { alert('Error: OBS ID missing'); return; }

  const formData = new FormData();
  formData.append('project', PROJECT);
  formData.append('obs_id', obsId);
  for (let i = 0; i < files.length; i++) formData.append('photos', files[i]);

  document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-info py-1">Uploading photos...</div>';
  fetch('/upload_photos', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        document.getElementById('uploadStatus').innerHTML = `<div class="alert alert-success py-1">${data.message}</div>`;
        document.getElementById('photoUpload').value = '';
        setTimeout(() => {
          fetch(`/get_obs_details?project=${encodeURIComponent(PROJECT)}&obs_id=${encodeURIComponent(obsId)}`)
            .then(r => r.json()).then(d => { if (!d.error) displayCurrentPhotos(d.photo_url); });
        }, 1000);
      } else {
        document.getElementById('uploadStatus').innerHTML = `<div class="alert alert-danger py-1">Error: ${data.error}</div>`;
      }
    })
    .catch(error => {
      console.error('Error uploading photos:', error);
      document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-danger py-1">Error uploading photos</div>';
    });
});
</script>
</body>
</html>
